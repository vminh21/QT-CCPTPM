name: CI Pipeline (Kiểm thử Tự động)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Job 1: Kiểm tra lỗi cú pháp Frontend (React)
  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Lấy mã nguồn về
        uses: actions/checkout@v3

      - name: Cài đặt Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package.json'

      - name: Cài đặt thư viện Frontend
        run: npm install

      - name: Chạy thử Build Frontend (Kiểm tra lỗi React/Vite)
        run: npm run build

  # Job 2: Kiểm tra lỗi cú pháp Backend (PHP)
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Lấy mã nguồn về
        uses: actions/checkout@v3

      - name: Thiết lập môi trường PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Kiểm tra lỗi cú pháp của tất cả file PHP
        run: |
          find backend -name "*.php" -exec php -l {} \; | grep -v "No syntax errors detected" || true
